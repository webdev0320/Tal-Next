name: Build and Deploy to public_html

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. ADDED: This compiles the code and generates the static 'out' folder
      - name: Build Next.js Application
        run: npm run build

      # 2. UPDATED: Explicitly target './out/' since the build step now guarantees its existence
      - name: Deploy to Remote Server
        uses: Burnett01/rsync-deployments@v9
        with:
          switches: -avzr --delete
          path: ./out/ 
          remote_path: /home/taxaccolega.co.uk/public_html
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}