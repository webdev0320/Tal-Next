name: Build and Deploy to public_html

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          DEST=/home/taxaccolega.co.uk/public_html
          if [ -d out ]; then
            rsync -a --delete out/ "$DEST"/
          elif [ -d .next/standalone ]; then
            rsync -a --delete .next/standalone/ "$DEST"/
            mkdir -p "$DEST/.next"
            rsync -a --delete .next/static/ "$DEST/.next/static"/
            if [ -d public ]; then
              rsync -a public/ "$DEST"/
            fi
          else
            echo "No out/ or .next/standalone build output found" >&2
            exit 1
          fi-